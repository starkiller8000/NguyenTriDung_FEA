<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wikipedia Search</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="text-center py-5">
            <h1 class="display-4">Wikipedia Search</h1>
            <p class="lead">Search Wikipedia articles instantly</p>
        </header>

        <!-- Search Section -->
        <div class="search-section mb-5">
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <form id="searchForm" class="d-flex gap-2">
                        <div class="position-relative flex-grow-1">
                            <input 
                                type="text" 
                                class="form-control form-control-lg" 
                                id="searchInput" 
                                placeholder="Search Wikipedia..." 
                                autocomplete="off"
                                required
                            >
                            <!-- Suggestion Box -->
                            <div id="suggestionBox" class="suggestion-box d-none"></div>
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg px-4" id="searchBtn">
                            <span class="spinner-border spinner-border-sm d-none" id="searchSpinner"></span>
                            <span id="searchBtnText">Search</span>
                        </button>
                    </form>
                    <div id="validationMessage" class="text-danger mt-2 d-none"></div>
                </div>
            </div>
        </div>

        <!-- Loading State -->
        <div id="loadingState" class="text-center py-5 d-none">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-3">Searching Wikipedia...</p>
        </div>

        <!-- Error State -->
        <div id="errorState" class="alert alert-danger d-none" role="alert"></div>

        <!-- Search Results Section -->
        <div id="searchResults" class="search-results d-none">
            <h2 class="mb-4">Search Results</h2>
            <div id="resultsGrid" class="row g-4"></div>
        </div>

        <!-- Article Detail Section -->
        <div id="articleDetail" class="article-detail d-none">
            <button id="backBtn" class="btn btn-outline-secondary mb-4">
                ← Back to search
            </button>
            <article id="articleContent"></article>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
